<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEFMART Tasks</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts (Poppins & Open Sans) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg border-bottom border-light bg-white">
    <div class="container">
      <a class="navbar-brand" href="#">CEFMART Tasks</a>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h2 class="text-center mb-4">My Tasks</h2>
            
            <form id="todo-form" class="d-flex gap-3 mb-4">
              <input type="text" id="todo-input" class="form-control" placeholder="What needs to be done?" required autocomplete="off">
              <button type="submit" class="btn btn-cefmart">Add</button>
            </form>

            <ul id="todo-list" class="list-group list-group-flush">
              <!-- Tasks injected via JS -->
            </ul>

            <div id="empty-state" class="text-center py-4">
              <p class="mb-0 text-muted small">No tasks yet. Add one above to get started!</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- App Logic -->
  <script src="script.js"></script>
</body>
</html>
